spring.application.name=notification-service
server.port=8081

# Kafka Consumer
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.type.mapping=userEvent:io.github.zaur2025.notificationservice.dto.UserEvent

# Email (settings for SMTP-server Yandex)
spring.mail.host=smtp.yandex.ru
spring.mail.port=587
spring.mail.username=magomedow.zaur2012@yandex.ru
spring.mail.password=glctzkvdaydpbhgb
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Emails from
spring.mail.from=magomedow.zaur2012@yandex.ru

# Topic name
app.kafka.topic.user-events=user-events-topic

# Logging
logging.level.io.github.zaur2025.notificationservice=DEBUG